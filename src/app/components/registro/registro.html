<div class="auth-box animate-fade">
  <h2>Iniciar Sesión</h2>
  <form class="auth-form" (submit)="entrar($event)">
    <div class="form-field"><label>Usuario</label><input type="email" placeholder="correo@ejemplo.com" required></div>
    <div class="form-field"><label>Clave</label><input type="password" required></div>
    <button type="submit" class="btn-auth">Ingresar</button>
  </form>
</div>
